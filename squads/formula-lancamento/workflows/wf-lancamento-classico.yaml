# ============================================================
# ERROR HANDLING
# ============================================================

error_handling:
  technical_failures:
    - scenario: "Pagina de vendas fora do ar durante abertura"
      severity: critical
      action: "Pausar todas as notificacoes. Corrigir imediato. Comunicar transparentemente."
      agent: fl-lancamento-classico
      escalation: fl-chief

    - scenario: "Gateway de pagamento rejeitando transacoes"
      severity: critical
      action: "Ativar gateway backup. Comunicar via email que estao trabalhando na solucao."
      agent: fl-lancamento-classico
      escalation: fl-chief

    - scenario: "Emails caindo em spam"
      severity: high
      action: "Ativar canal alternativo (WhatsApp, Telegram). Reenviar via dominio diferente."
      agent: fl-lancamento-classico

    - scenario: "Video de vendas nao carrega"
      severity: high
      action: "Trocar host do video. Oferecer link alternativo. Considerar versao texto da pagina."
      agent: fl-lancamento-classico

  strategic_failures:
    - scenario: "CPL1 com engajamento muito baixo (menos de 10% dos inscritos)"
      severity: high
      action: "Investigar entrega. Testar notificacao alternativa. Considerar refazer CPL1 se ainda ha tempo."
      agent: fl-lancamento-classico

    - scenario: "Zero vendas nas primeiras 24h de carrinho"
      severity: critical
      action: "Investigar: pagina OK? Gateway OK? Preco adequado? Oferta alinhada? Comunidade engajada?"
      agent: fl-lancamento-classico
      escalation: fl-chief

    - scenario: "Vendas muito abaixo da meta no meio do carrinho"
      severity: medium
      action: "Ativar Efeito W. Reforcar comunicacao. Adicionar bonus ou ajustar parcelamento."
      agent: fl-lancamento-classico

    - scenario: "Tsunami nao gerando efeito esperado"
      severity: medium
      action: "Verificar se escassez e percebida como real. Aumentar frequencia de comunicacao."
      agent: fl-lancamento-classico

  process_failures:
    - scenario: "CPL3 scriptado sem atualizar arvore de objecoes"
      severity: high
      action: "BLOQUEAR publicacao. Atualizar arvore primeiro. Revisar script do CPL3."
      agent: fl-alicerce

    - scenario: "Escassez falsa comunicada"
      severity: critical
      action: "BLOQUEAR imediato. Corrigir comunicacao. Integridade e inegociavel."
      agent: fl-lancamento-classico
      escalation: fl-chief

    - scenario: "Carrinho estendido alem do prazo comunicado"
      severity: critical
      action: "BLOQUEAR. Fechar carrinho imediato. Escassez deve ser real. Comunicar erro se necessario."
      agent: fl-lancamento-classico

