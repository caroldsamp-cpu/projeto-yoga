      responsible: fl-chief
      mandatory: true

# =============================================================================
# ERROR HANDLING
# =============================================================================

  error_handling:
    general_principle: >
      "Feito e melhor que perfeito." Erros sao esperados no primeiro semente.
      O importante e executar, aprender e documentar no debriefing.
      [SOURCE: Os erros mais comuns no Lancamento Semente.txt]

    scenarios:
      - error: "Zero leads captados apos 7 dias"
        severity: HIGH
        action: "Pausar captacao. Revisar criativos, pagina e segmentacao."
        agent: fl-lancamento-semente
        escalate_to: fl-chief

      - error: "Plataforma de transmissao fora do ar no dia D"
        severity: CRITICAL
        action: "Ativar plano B imediato (YouTube Live, Zoom, Google Meet)"
        agent: fl-lancamento-semente
        escalate_to: null
        note: "Nao cancelar. Trocar de plataforma e avisar inscritos."

      - error: "Gateway de pagamento nao funciona durante carrinho"
        severity: CRITICAL
        action: "Corrigir imediatamente. Se necessario, aceitar pagamento manual (Pix)."
        agent: fl-lancamento-semente
        escalate_to: fl-chief

      - error: "Expert trava durante o webinario e nao faz oferta"
        severity: HIGH
        action: "Enviar email de oferta IMEDIATAMENTE apos o webinario."
        agent: fl-copy
        escalate_to: fl-lancamento-semente
        note: "Oferta por email e melhor que nenhuma oferta."

      - error: "Zero vendas apos fechar carrinho"
        severity: MEDIUM
        action: "NAO desistir. Debriefing detalhado + revisar oferta com fl-oferta."
        agent: fl-lancamento-semente
        escalate_to: fl-oferta
        note: "Zero vendas no semente e dado, nao fracasso. Ajustar e relancar."

      - error: "Expert quer prolongar carrinho alem da terca"
        severity: MEDIUM
        action: "BLOQUEAR. Escassez precisa ser real. Fechar e analisar."
        agent: fl-lancamento-semente
        escalate_to: null

      - error: "Expert quer pular debriefing"
        severity: HIGH
        action: "BLOQUEAR transicao. Debriefing e obrigatorio."
        agent: fl-lancamento-semente
        heuristic: "LS_H005"

      - error: "Expert quer repetir semente apos validar oferta"
        severity: MEDIUM
        action: "ALERTAR — transitar para Lancamento Classico."
        agent: fl-lancamento-semente
        heuristic: "LS_H001"

