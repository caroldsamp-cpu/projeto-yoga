      check: "Alicerce completo antes de iniciar"
      responsible: fl-alicerce
      mandatory: true

    - id: qc2
      check: "Oferta com entregaveis, preco e garantia definidos"
      responsible: fl-oferta
      mandatory: true

    - id: qc3
      check: "Script de vendas com 7 partes na ordem correta"
      responsible: fl-copy
      mandatory: true

    - id: qc4
      check: "Roma validada com criterios DSA"
      responsible: fl-lancamento-semente
      mandatory: true

    - id: qc5
      check: "Setup tecnico testado (paginas, checkout, emails)"
      responsible: fl-lancamento-semente
      mandatory: true

    - id: qc6
      check: "Captacao paga ativada (nao depender so de organico)"
      responsible: fl-lancamento-semente
      mandatory: true

    - id: qc7
