name: "light-copy-kb"
version: "2.0.0"
description: "Squad de Light Copy (M1-M4) + Stories 10x (37 dispositivos) baseado nas tecnicas de Leandro Ladeira"
author: "Projeto Yoga"
license: "MIT"

aios:
  minVersion: "2.1.0"
  type: squad

components:
  agents:
    - lc-chief.md
    - lc-rewriter.md
    - lc-stories.md
  tasks:
    - escrever-light-copy.md
    - revisar-light-copy.md
    - criar-sequencia-stories.md
