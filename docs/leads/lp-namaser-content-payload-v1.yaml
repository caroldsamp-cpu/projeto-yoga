expertise:
  eyebrow:
    number: "03"
    label: "Como Funciona"
  cards:
    - title: "Sadhana na vida real"
      description: "Voce nao precisa de dia perfeito para praticar. O caminho comeca com o que e possivel hoje."
      featured: true
      tags: ["presenca", "rotina real", "sem culpa"]
    - title: "Metodo de continuidade"
      description: "Regular, abrir espaco, expandir e integrar: um ciclo para sair do excesso e voltar para voce."
      tags: ["constancia", "ritmo", "clareza"]
    - title: "Acolhimento de verdade"
      description: "Suporte para iniciantes e para quem esta recomeçando, sem comparacao e sem performance."
      tags: ["acolhimento", "iniciante", "seguranca"]
    - title: "Comunidade que sustenta"
      description: "Voce pratica acompanhada por mulheres com desafios parecidos, com pertencimento e incentivo real."
      tags: ["comunidade", "pertencimento"]

quote:
  eyebrow:
    number: "04"
    label: "Mensagem Central"
  text: "Constancia simples transforma mais que intensidade ocasional. No NamaSer, voce volta para voce, no meio da vida real."
  attribution:
    name: "Gaby Drummond"
    role: "Fundadora NamaSer"

stack:
  eyebrow:
    number: "05"
    label: "Para Quem E"
  heading: "Clareza antes de entrar"
  items:
    - name: "Para voce que vive sobrecarregada"
      detail: "Quer desacelerar mente e corpo sem depender de longas janelas de tempo."
    - name: "Para voce que e iniciante ou insegura"
      detail: "Busca um caminho acolhedor para comecar sem medo de nao dar conta."
    - name: "Para voce que quer constancia real"
      detail: "Quer manter pratica no dia a dia sem perfeccionismo e sem culpa."
    - name: "Nao e para performance"
      detail: "Aqui o foco nao e exibicao de postura; e presenca aplicavel a vida real."

