    label: "Como Funciona"
  cards:
    - title: "Voce comeca de onde esta"
      description: "Sem precisar de dia perfeito, roupa especial ou rotina ideal. A pratica comeca com o possivel."
      featured: true
      tags: ["vida real", "acolhimento", "sem pressao"]
    - title: "Metodo em ciclo"
      description: "Regular, abrir espaco, expandir e integrar: um fluxo que ajuda voce a sair do excesso e voltar para si."
      tags: ["metodo", "continuidade"]
    - title: "Praticas curtas e profundas"
      description: "Conteudos para dias corridos e para dias de aprofundamento, no seu tempo e no seu ritmo."
      tags: ["praticas curtas", "flexibilidade"]
    - title: "Suporte e comunidade"
      description: "Voce e acompanhada por uma rede de mulheres que tambem buscam leveza e consistencia."
      tags: ["comunidade", "pertencimento"]

