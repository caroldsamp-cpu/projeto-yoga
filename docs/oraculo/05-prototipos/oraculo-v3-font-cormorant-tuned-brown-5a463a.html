  <style>
    :root {

      --radius-xl: 24px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:

    }

    .wrap {
      width: min(840px, 100%);
      text-align: center;
    }

    h1 {

      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 500;
      line-height: 1.1;
    }

    .subtitle {
      max-width: 560px;
      margin: 10px auto 16px;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .micro-note {
      margin: 0 auto 14px;
      color: #8a7f74;
      font-size: 13px;
      letter-spacing: .03em;
    }


    .actions {
      margin-bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: var(--radius-md);
      min-width: var(--target-comfort-size);
      min-height: var(--target-comfort-size);
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .btn-primary { color: #fff; background: linear-gradient(135deg, #2d6b54, #4f7f6f); box-shadow: 0 8px 22px rgba(45,107,84,.24); }
    .btn-secondary { color: var(--primary); background: #fff; border: 1px solid #e5dbcf; }
    button:hover { transform: translateY(-1px); }
    button:focus-visible {
      outline: var(--focus-ring);
      outline-offset: var(--focus-ring-offset);
    }
    button:disabled {
      opacity: var(--disabled-opacity);
      cursor: not-allowed;
      transform: none;
    }

    .ritual {
      min-height: 52px;
      margin-bottom: 10px;
      display: grid;
      place-items: center;
    }

    .ritual-step {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #8d7b67;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s ease, transform .3s ease;
    }

    .ritual-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }

    .ritual-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(141,123,103,.28);
      transition: all .25s ease;
    }

    .ritual-dot.active {
      background: rgba(141,123,103,.82);
      transform: scale(1.08);
    }

    .ritual-step.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card-frame {
      max-width: 480px;
      margin: 0 auto;
      padding: 0;
      border-radius: var(--radius-xl);
      background: transparent;
      border: 0;
      box-shadow: none;
      display: none;
    }

    .card-frame.visible {
      display: block;
    }

    .card-frame.reveal-pop {
      animation: revealPop .42s ease;
    }

    @keyframes revealPop {
      from { transform: translateY(8px); opacity: .88; }
      to { transform: translateY(0); opacity: 1; }
    }

    .card {
      min-height: 560px;
      text-align: left;
      border-radius: 12px;
      border: 1.5px solid var(--line);
      box-shadow: 0 16px 40px rgba(61,58,56,.08);
      padding: 22px 24px 20px;
      position: relative;
      background:
        linear-gradient(180deg, var(--paper), var(--paper-2));
      overflow: hidden;
    }

    .orn-top,
    .orn-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--ornament);
      opacity: .9;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .orn-top {
      margin-bottom: 12px;
    }

    .orn-top::before,
    .orn-top::after,
    .orn-bottom::before,
    .orn-bottom::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(143,117,81,.55), transparent);
    }

    .orn-mark {
      display: none;
      width: 92px;
      height: 16px;
    }

    .virtude {
      margin: 0 0 16px;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(44px, 8vw, 62px);
      color: var(--title);
      line-height: .95;
      font-weight: 500;
      text-transform: lowercase;
      text-align: center;
      transition: color .28s ease;
    }

    .texto {
      margin: 0;
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-size: clamp(21px, 2.4vw, 24px);
      line-height: 1.68;
      letter-spacing: .005em;
      font-weight: 500;
      color: var(--card-text);
      max-width: 98%;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .parte {
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .35s ease, transform .35s ease;
      margin-bottom: 10px;
    }

    .parte:empty {
      display: none;
    }

    .parte.show {
      opacity: 1;
      transform: translateY(0);
    }

    .parte.init {
      color: var(--ink-soft);
      text-align: center;
      margin-top: 10px;
    }

    .orn-bottom {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 14px;
      align-items: center;
      gap: 8px;
    }

    .seal {
      border: 0;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      letter-spacing: .07em;
      color: var(--ink-soft);
      background: rgba(255,255,255,.45);
    }

    .credit {
      margin-top: 34px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      font-weight: 300;
      text-transform: none;
      color: #9b8c7a;
      letter-spacing: .12em;
      display: none;
    }

    .credit.visible {
      display: block;
    }

    @media (max-width: 640px) {
      .card { min-height: 560px; padding: 18px 16px 18px; }
      .virtude { font-size: clamp(38px, 12vw, 52px); }
      .texto { font-size: 20px; line-height: 1.52; }
      .orn-bottom { left: 16px; right: 16px; }
      .ritual { min-height: 44px; }
    }
  </style>
</head>

    function buildDeck(rawCards) {
      return rawCards.map((card, index) => ({
        ...card,
        titleColor: card.titleColor || TITLE_COLORS[index % TITLE_COLORS.length]
      }));
    }

    const cartas = buildDeck(CARTAS_RAW);

    const tirarCartaBtn = document.getElementById("tirarCarta");
    const copiarBtn = document.getElementById("copiar");
    const cardFrame = document.getElementById("cardFrame");
    const credit = document.querySelector(".credit");
    const ritualStatus = document.getElementById("ritualStatus");
    const virtudeEl = document.getElementById("virtude");
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");
    const p3 = document.getElementById("p3");

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function showRitualLabel(label, activeDot) {
      ritualStatus.innerHTML = `<span class="ritual-step"><span class="ritual-dots"><span class="ritual-dot ${activeDot===0?'active':''}"></span><span class="ritual-dot ${activeDot===1?'active':''}"></span><span class="ritual-dot ${activeDot===2?'active':''}"></span></span>${label}</span>`;
      const el = ritualStatus.querySelector(".ritual-step");
      requestAnimationFrame(() => el.classList.add("show"));
    }

    async function ritual321() {
      tirarCartaBtn.disabled = true;
      await showRitualLabel("Respira", 0);
      await wait(1400);
      await showRitualLabel("Solta", 1);
      await wait(1400);
      await showRitualLabel("Observa", 2);
      await wait(1400);
      await wait(400);
      ritualStatus.innerHTML = "";
      tirarCartaBtn.disabled = false;
    }

    function animateCardFrame() {
      cardFrame.classList.remove("reveal-pop");
      void cardFrame.offsetWidth;
      cardFrame.classList.add("reveal-pop");
    }

    function setPart(el, text) {
      const value = (text || "").trim();
      el.textContent = value;
      el.classList.remove("show");
      if (!value) {
        el.style.display = "none";
      } else {
        el.style.display = "";
      }
    }


    async function sortearCarta() {
      if (!cartas.length) {
        ritualStatus.innerHTML = '<span class="ritual-step show">Nenhuma carta carregada</span>';
        return;
      }
      await ritual321();
      const idx = Math.floor(Math.random() * cartas.length);
      const carta = cartas[idx];

      cardFrame.classList.add("visible");
      credit.classList.add("visible");
      virtudeEl.textContent = carta.virtude;
      virtudeEl.style.color = carta.titleColor;
      setPart(p1, carta.partes[0]);
      setPart(p2, carta.partes[1]);
      setPart(p3, carta.partes[2]);
      animateCardFrame();

      [p1, p2, p3].forEach((p, index) => {
        if (p.textContent.trim()) {
          setTimeout(() => p.classList.add("show"), 140 + (index * 500));
        }
      });

      copiarBtn.disabled = false;
    }

    function copiarCarta() {
      const texto = `Oráculo do Sadhana\n\n${virtudeEl.textContent.toUpperCase()}\n\n${p1.textContent} ${p2.textContent} ${p3.textContent}`;
      if (!navigator.clipboard || !navigator.clipboard.writeText) {
        copiarBtn.textContent = "Não foi possível copiar";
        setTimeout(() => { copiarBtn.textContent = "Copiar carta"; }, 1500);
        return;
      }
      navigator.clipboard.writeText(texto.trim());
      copiarBtn.textContent = "Copiado";
      setTimeout(() => { copiarBtn.textContent = "Copiar carta"; }, 1200);
    }

    tirarCartaBtn.addEventListener("click", sortearCarta);
    copiarBtn.addEventListener("click", copiarCarta);

  </script>
