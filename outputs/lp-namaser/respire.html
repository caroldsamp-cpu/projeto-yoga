  <style>
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 300; font-display: swap; src: url('fonts/inter-300.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('fonts/inter-400.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('fonts/inter-500.woff2') format('woff2'); }
    @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 400; font-display: swap; src: url('fonts/playfair-400.woff2') format('woff2'); }
    @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 500; font-display: swap; src: url('fonts/playfair-500.woff2') format('woff2'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #FDFBF7;
      --bg-secondary: #F5F0EB;
      --text-primary: #2D2926;
      --text-secondary: #5D5145;
      --accent: #1A6B6A;
      --accent-hover: #145655;
      --border: #E8E0D6;
      --white: #fff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --radius-btn: 12px;
      --radius-card: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .headline {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-weight: 300;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: var(--bg-secondary);
      border-radius: var(--radius-card);
      overflow: hidden;
      margin-bottom: 48px;
      box-shadow: 0 8px 32px rgba(45, 41, 38, 0.10);
    }

    .video-wrapper video,
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-secondary);
      font-size: 1rem;
      font-style: italic;
    }

    .message {
      font-family: var(--font-serif);
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--text-secondary);
      font-style: italic;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: var(--white);
      font-family: var(--font-sans);
      font-size: 1.05rem;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      min-height: 48px;
    }
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(45, 41, 38, 0.10);
      background: var(--accent-hover);
    }
    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: none;
    }

    .micro-text {
      font-size: 0.9rem;
      color: #A89888;
      margin-top: 12px;
    }

    .logo {
      margin-bottom: 48px;
    }
    .logo img {
      height: 80px;
      width: auto;
      margin: 0 auto;
      display: block;
    }

    @media (max-width: 639px) {
      body { padding: 20px 16px; }
      .btn-primary { width: 100%; }
    }
  </style>

<div class="container">
  <div class="logo">
    <img src="img/logo-gaby.svg" alt="Gaby Drummond Yoga">
  </div>

  <h1 class="headline">Respira fundo. Eu te guio a partir daqui.</h1>
  <p class="subtitle">Aperta o play quando estiver pronta.</p>

  <div class="video-wrapper">
    <!-- Placeholder até o vídeo ser cortado e hospedado -->
    <p class="video-placeholder">Vídeo em breve</p>
  </div>

  <p class="message">Se algo suavizou aí dentro, imagina o que acontece quando você cria esse espaço todo dia.</p>

  <a href="/" class="btn-primary">Conhecer o NamaSer</a>
  <p class="micro-text">Yoga e presença para a vida real. No seu ritmo.</p>
