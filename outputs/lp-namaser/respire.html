  <style>
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 300; font-display: swap; src: url('fonts/inter-300.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400; font-display: swap; src: url('fonts/inter-400.woff2') format('woff2'); }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 500; font-display: swap; src: url('fonts/inter-500.woff2') format('woff2'); }
    @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 400; font-display: swap; src: url('fonts/playfair-400.woff2') format('woff2'); }
    @font-face { font-family: 'Playfair Display'; font-style: normal; font-weight: 500; font-display: swap; src: url('fonts/playfair-500.woff2') format('woff2'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #FDFBF7;
      --bg-warm: #F8F4EE;
      --text-primary: #2D2926;
      --text-secondary: #5D5145;
      --text-soft: #A89888;
      --accent: #1A6B6A;
      --accent-hover: #145655;
      --accent-light: rgba(26, 107, 106, 0.06);
      --lavender: #9ED5DB;
      --border: #E8E0D6;
      --white: #fff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --radius-btn: 12px;
      --radius-lg: 24px;
      --shadow-soft: 0 4px 24px rgba(45, 41, 38, 0.06);
      --shadow-warm: 0 12px 40px rgba(45, 41, 38, 0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      color: var(--text-primary);
      background: var(--bg-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Paper grain texture — same organic feel as LP */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Gentle breathing glow */
    @keyframes breathe {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.08); }
    }
    .breath-glow {
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 120vw;
      height: 120vh;
      background: radial-gradient(ellipse at 50% 30%, rgba(158,213,219,0.1) 0%, rgba(158,213,219,0.03) 40%, transparent 70%);
      animation: breathe 10s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Content */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 24px 32px;
    }

    .logo {
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.3s;
    }
    .logo img {
      height: 100px;
      width: auto;
      margin: 0 auto;
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .headline {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.25;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.5s;
    }

    .subtitle {
      font-family: var(--font-sans);
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: var(--text-soft);
      margin-bottom: 24px;
      font-weight: 300;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.7s;
    }

    /* Video card */
    .video-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 6px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-warm);
      opacity: 0;
      animation: fadeIn 1s ease forwards 0.9s;
    }
    .video-inner {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg-warm);
    }
    .video-inner video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Message below video */
    .message {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-secondary);
      margin-bottom: 4px;
      line-height: 1.6;
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.1s;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 20px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.2s;
    }

    /* CTA area */
    .cta-area {
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.3s;
    }

    .btn-primary {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: var(--radius-btn);
      border: 1px solid rgba(26, 107, 106, 0.15);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
      min-height: 48px;
    }
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: var(--shadow-soft);
      background: rgba(26, 107, 106, 0.1);
      border-color: rgba(26, 107, 106, 0.3);
    }
    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: none;
    }

    .micro-text {
      font-size: 0.85rem;
      color: var(--text-soft);
      margin-top: 16px;
      letter-spacing: 0.01em;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      .breath-glow { animation: none; opacity: 0.3; }
      .logo, .headline, .subtitle, .video-card, .message, .divider, .cta-area {
        animation: none;
        opacity: 1;
      }
    }

    @media (max-width: 639px) {
      .page { padding: 40px 16px 40px; }
      .logo { margin-bottom: 40px; }
      .btn-primary { width: 100%; }
      .video-card { padding: 4px; }
    }
  </style>
</head>
